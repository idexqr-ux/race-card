<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Race</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <div class="wrap">
    <a class="back" href="./index.html">← Back to Gate</a>
    <h1 id="raceTitle">Race</h1>
    <div id="runners"></div>
  </div>

  <script src="./app.js"></script>
  <script>
  (async () => {
    const raceId = qs("race_id") || "R1"; // default for testing
    const data = await loadCSV("./gatecard.csv");
    const rows = data.filter(r => r.race_id === raceId);

    document.getElementById("raceTitle").textContent =
      rows.length ? `${rows[0].race_time} — ${rows[0].race_title}` : "Race not found";

    document.getElementById("runners").innerHTML = rows.map(r =>
      `<a class="card" href="./runner.html?race_id=${encodeURIComponent(r.race_id)}&runner_id=${encodeURIComponent(r.runner_id)}">
        <div class="title">${r.runner_no}. ${r.runner_name}</div>
        <div class="sub">${r.trainer} • ${r.jockey} • Form: ${r.form}</div>
      </a>`
    ).join("");
  })();
  </script>
</body>
</html>
